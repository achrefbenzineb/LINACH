<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>I love u lanoucha</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        height: 100vh;
        width: 100%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .hearts-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .heart {
        position: absolute;
        bottom: -50px;
        color: #ff1744;
        font-size: 24px;
        opacity: 0.8;
        animation: floatUp linear infinite;
        text-shadow: 0 0 10px #ff1744, 0 0 20px #ff0033;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0.9;
        }
        100% {
          transform: translateY(-110vh) rotate(360deg);
          opacity: 0;
        }
      }

      .love-text {
        position: relative;
        z-index: 2;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 4rem;
        font-weight: bold;
        color: #ff1744;
        text-shadow: 0 0 20px #ff1744, 0 0 40px #ff0000, 0 0 60px #b30000;
        text-align: center;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 90vw;
        animation: hue 4s linear infinite;
      }

      .love-text span {
        display: inline-block;
        animation: bounce 2s ease-in-out infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        25% {
          transform: translateY(-20px) rotate(-4deg);
        }
        50% {
          transform: translateY(0) rotate(0deg);
        }
        75% {
          transform: translateY(20px) rotate(4deg);
        }
      }

      @keyframes hue {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(360deg);
        }
      }

      @media (max-width: 600px) {
        .love-text {
          font-size: 2.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="love-text" id="loveText"></div>

    <script>
      // Split text into letters so each one bounces independently
      const text = "I love u lanoucha lka7loucha";
      const container = document.getElementById("loveText");

      [...text].forEach((char, i) => {
        const span = document.createElement("span");
        span.textContent = char === " " ? "\u00A0" : char;
        span.style.animationDelay = i * 0.1 + "s";
        container.appendChild(span);
      });

      // Floating hearts, same as main page
      const heartsContainer = document.getElementById("heartsContainer");
      const heartSymbols = ["❤", "💕", "💖", "💘"];

      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.textContent =
          heartSymbols[Math.floor(Math.random() * heartSymbols.length)];

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 16 + Math.random() * 22 + "px";

        const duration = 6 + Math.random() * 6;
        heart.style.animationDuration = duration + "s";

        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), duration * 1000);
      }

      setInterval(createHeart, 300);
      for (let i = 0; i < 15; i++) {
        setTimeout(createHeart, i * 150);
      }
    </script>
  </body>
</html>
